services:
  # ── Backend (FastAPI) ──────────────────────────────────────
  - type: web
    name: vitasage-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: "8"
      - key: ALLOWED_ORIGINS
        sync: false   # Set to Vercel URL after frontend deploy
      - key: REGISTER_SECRET
        sync: false
    healthCheckPath: /health
    autoDeploy: true
